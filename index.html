<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Datos</title>

    <style>
        /* VIDEO DE FONDO */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* CAPA OSCURA (más clara ahora) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* menos oscuro */
            z-index: -1;
        }

        body {
            font-family: 'Roboto', sans-serif;
            padding: 40px;
            margin: 0;
        }

        /* FORMULARIO EFECTO VIDRIO */
        .demo-form-card {
            position: relative;
            z-index: 1;
            background: rgba(30, 30, 30, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 12px;
            max-width: 480px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(204, 255, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* TÍTULO VERDE LIMÓN */
        h3 {
            text-align: center;
            color: #ccff00;
            font-size: 24px;
            margin-top: 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ccff00;
        }

        p {
            text-align: center;
            color: #dddddd;
            font-size: 15px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 18px;
            color: #f0f0f0;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 7px;
            border: 2px solid #444;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: rgba(44,44,44,0.7);
            color: #ffffff;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ccff00;
            outline: none;
            background-color: rgba(60,60,60,0.8);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            background-color: #ccff00;
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #e6ff66;
        }

        .resultado {
            margin-top: 25px;
            padding: 20px;
            background-color: rgba(44,44,44,0.7);
            border-radius: 8px;
            color: #ffffff;
            border-left: 5px solid #ccff00;
        }
    </style>
</head>

<body>

<!-- VIDEO DE FONDO -->
<video autoplay muted loop id="bg-video">
    <source src="Relaxing Frog Animation _ Peaceful Pond Aesthetic with Calming Piano Music(MP4).mp4" type="video/mp4">
</video>

<section class="demo-form-card">
  <h3>Formulario de Datos</h3>
  <p>Ingresa toda la información solicitada</p>

  <form>
    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre completo">

    <label for="edad">Edad:</label>
    <input type="number" id="edad" placeholder="Escribe tu edad">

    <label for="correo">Correo:</label>
    <input type="email" id="correo" placeholder="ejemplo@correo.com">

    <label for="grupo">Grupo:</label>
    <input type="text" id="grupo" placeholder="Ejemplo: 4° A">

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" placeholder="Tu número de teléfono">

    <label for="fecha">Fecha:</label>
    <input type="date" id="fecha">

    <label for="ciudad">Ciudad:</label>
    <input type="text" id="ciudad" placeholder="Ciudad donde vives">

    <label for="materia">Materia favorita:</label>
    <input type="text" id="materia" placeholder="¿Cuál es tu favorita?">

    <label for="comentario">Comentario:</label>
    <textarea id="comentario" placeholder="Escribe aquí tus comentarios..."></textarea>

    <button type="button" onclick="mostrarDatos()">Mostrar datos</button>
  </form>

  <div id="resultado" class="resultado">
    Aquí aparecerá la información capturada.
  </div>
</section>

<script>
function mostrarDatos() {
    const nombre = document.getElementById('nombre').value;
    const edad = document.getElementById('edad').value;
    const correo = document.getElementById('correo').value;
    const grupo = document.getElementById('grupo').value;
    const telefono = document.getElementById('telefono').value;
    const fecha = document.getElementById('fecha').value;
    const ciudad = document.getElementById('ciudad').value;
    const materia = document.getElementById('materia').value;
    const comentario = document.getElementById('comentario').value;

    const resultado = document.getElementById('resultado');

    if (nombre && edad && correo && grupo && telefono && fecha && ciudad && materia) {
        resultado.innerHTML = `
            <strong>✅ Datos Registrados:</strong><br><br>
            <strong>Nombre:</strong> ${nombre}<br>
            <strong>Edad:</strong> ${edad} años<br>
            <strong>Correo:</strong> ${correo}<br>
            <strong>Grupo:</strong> ${grupo}<br>
            <strong>Teléfono:</strong> ${telefono}<br>
            <strong>Fecha:</strong> ${fecha}<br>
            <strong>Ciudad:</strong> ${ciudad}<br>
            <strong>Materia Favorita:</strong> ${materia}<br>
            <strong>Comentario:</strong> ${comentario}
        `;
        resultado.style.color = "#ffffff";
    } else {
        resultado.innerHTML = "⚠️ Por favor, llena todos los campos obligatorios.";
        resultado.style.color = "#ccff00";
    }
}
</script>

</body>
</html>
